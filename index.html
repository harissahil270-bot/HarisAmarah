<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haris Amarah</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d0d0d;
color:#fff;
}

header{
background:#000;
padding:20px;
text-align:center;
position:sticky;
top:0;
}

header h1{
font-size:40px;
color:#FFD700;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px gold;}
to{text-shadow:0 0 25px orange;}
}

nav{
margin-top:15px;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
font-size:18px;
}

.hero{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
background:linear-gradient(135deg,#000,#222);
}

.hero h2{
font-size:50px;
color:#FFD700;
}

.hero p{
margin-top:15px;
font-size:22px;
}

.btn{
margin-top:25px;
padding:15px 35px;
background:#FFD700;
color:black;
text-decoration:none;
border-radius:30px;
font-weight:bold;
}

section{
padding:60px 20px;
text-align:center;
}

.card{
background:#1b1b1b;
padding:25px;
margin:20px auto;
max-width:400px;
border-radius:15px;
}

footer{
background:#000;
padding:20px;
text-align:center;
margin-top:50px;
}
</style>

</head>

<body>

<header>

<h1>Haris Amarah</h1>

<nav>
<a href="#">Home</a>
<a href="#products">Products</a>
<a href="#posts">Posts</a>
<a href="#contact">Contact</a>
</nav>

</header>

<div class="hero">

<h2>Welcome To Haris Amarah</h2>

<p>Posting & Selling Platform</p>

<a class="btn" href="#products">Explore Now</a>

</div>
